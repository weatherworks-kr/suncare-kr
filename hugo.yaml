baseURL: "https://suncare.kr/"
languageCode: "ko"
title: "썬케어 가이드 — 자외선 차단, 쉽게 알려드려요"
theme: "PaperMod"

defaultContentLanguage: "ko"
enableRobotsTXT: true
buildDrafts: false
buildFuture: false

minify:
  disableXML: true
  minifyOutput: true

outputs:
  home:
    - HTML
    - RSS
    - JSON

params:
  env: production
  title: "썬케어 가이드"
  description: "자외선 차단을 쉽고 친근하게 알려주는 생활 밀착형 가이드. 일상 속 UV 대비법, 계절별 관리, 양산 추천 정보를 제공합니다."
  keywords: ["썬케어", "자외선 차단", "피부 관리", "양산 추천", "자외선 대비", "UV 차단 생활"]
  author: "썬케어 가이드"
  images: ["/images/og-default.jpg"]
  DateFormat: "2006년 1월 2일"

  defaultTheme: light
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  hidemeta: false
  hideSummary: false

  homeInfoParams:
    Title: "☀️ 썬케어 가이드"
    Content: >
      자외선 차단, 어렵지 않아요!
      일상 속 쉬운 UV 대비법부터 양산 추천까지, 피부를 지키는 모든 팁을 알려드려요 🌂

  socialIcons:
    - name: rss
      url: "/index.xml"

  analytics:
    google:
      SiteVerificationTag: "LlL0_N05ouftUWE5Fpd8lBotVjFsI3zkvHb5oKDEcUA"

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: search
      name: "🔍 검색"
      url: /search/
      weight: 1
    - identifier: categories
      name: "📂 카테고리"
      url: /categories/
      weight: 2
    - identifier: tags
      name: "🏷️ 태그"
      url: /tags/
      weight: 3

markup:
  goldmark:
    renderer:
      unsafe: true

sitemap:
  changeFreq: "weekly"
  filename: "sitemap.xml"
  priority: 0.5

taxonomies:
  category: categories
  tag: tags
